name: "@foundrynet/weather-intel-mcp"
displayName: "FoundryNet Weather Intelligence"
description: >-
  Weather forecasts, historical climate data, severe alerts, agricultural outlook, and travel condition comparison from NOAA and NWS.
icon: "🌤️"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/weather-intel-mcp"
license: "MIT"
categories:
  - data
  - weather
tags:
  - weather-forecast
  - climate-data
  - noaa
  - weather-alerts
  - historical-weather
  - agricultural-weather
keywords:
  - weather-forecast
  - climate-data
  - noaa
  - weather-alerts
  - historical-weather
  - agricultural-weather
attestation:
  protocol: "MINT Protocol"
  verified_outputs: true
  live_feed: "https://mint.foundrynet.io/feed"
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://weather-intel-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
