name: "@foundrynet/weather-intel-mcp"
displayName: "FoundryNet Supply Chain Weather Risk Scorer"
description: >-
  Supply chain weather risk scoring and transport condition assessment — score shipping routes, flag threats, and get shipment recommendations. Also provides raw NOAA forecasts, alerts, and climate data.
icon: "🌤️"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/weather-intel-mcp"
license: "MIT"
categories:
  - data
  - weather
tags:
  - supply-chain
  - logistics
  - shipping-risk
  - transport-weather
  - route-risk
  - weather-forecast
  - climate-data
  - noaa
  - weather-alerts
  - historical-weather
  - agricultural-weather
keywords:
  - supply-chain
  - logistics
  - shipping-risk
  - transport-weather
  - route-risk
  - weather-forecast
  - climate-data
  - noaa
  - weather-alerts
  - historical-weather
  - agricultural-weather
attestation:
  protocol: "MINT Protocol"
  verified_outputs: true
  live_feed: "https://mint.foundrynet.io/feed"
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://weather-intel-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
